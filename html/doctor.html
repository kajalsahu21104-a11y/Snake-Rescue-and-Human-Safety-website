<!-- hospital_form.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Admin Form</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
   <meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Tint&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="../css/homeadmin.css">
</head>
<body>
  <div class="container">
    <h2 id ="title">Doctor Admin Form</h2>
    <form id="doctorForm" enctype="multipart/form-data">
      <input type="text" id="doctorName" name="doctor_name" placeholder="Doctor Name" required>
      <input type="text" id="specialization" name="specialization" placeholder="Specialization" required>
      <input type="email" id="email" name="email" placeholder="Email" required>
      <input type="text" id="timing" name="timing" placeholder="Timing" required>
      <input type="text" id="location" name="location" placeholder="Location" required>
      <input type="text" id="mobile" name="mobile" placeholder="Mobile" required>
      <input type="file" id="photo" name="photo" required>
      <button type="submit">Submit</button>
    </form>

  </div>
  <script src="../js/homeadmin.js"></script>
</body>
</html>
